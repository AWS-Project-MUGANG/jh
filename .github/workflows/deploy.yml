name: Deploy to Amazon ECR and EKS

on:
  push:
    branches:
      - main # 메인 브랜치에 코드가 푸시되면 자동 실행

env:
  AWS_REGION: ap-northeast-2 # 서울 리전
  ECR_FRONTEND_REPOSITORY: mugang-frontend
  ECR_BACKEND_REPOSITORY: mugang-backend
  EKS_CLUSTER_NAME: mugang-eks-cluster # 생성할 EKS 클러스터 이름 명시 필요

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 1. AWS 자격 증명 (Github 설정에 저장해둔 액세스 키 사용)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 2. Amazon ECR 로깅
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 3. 프론트엔드(Vanilla JS + Nginx) 도커 이미지 빌드 및 ECR 푸시
    - name: Build and Push Frontend Image
      id: build-frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG
        echo "FRONTEND_IMAGE=$ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    # 4. 백엔드(FastAPI) 도커 이미지 빌드 및 ECR 푸시
    - name: Build and Push Backend Image
      id: build-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG
        echo "BACKEND_IMAGE=$ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    # 5. EKS 블루/그린 배포 (또는 롤링 업데이트 매니페스트 배포) 파트
    # (실제 환경에서는 k8s deployment.yml 파일을 덮어쓰는 kubectl apply 실행)
    - name: Update KubeConfig and Deploy to EKS
      run: |
        # AWS EKS 콘솔과 연결 제어권 가져오기
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
        
        # (임시) 현업에서는 image set 명령어나 kustomize로 새로운 SHA 태그 이미지를 배포
        # kubectl set image deployment/frontend-deployment frontend=$FRONTEND_IMAGE
        # kubectl set image deployment/backend-deployment backend=$BACKEND_IMAGE
        
        echo "Deployment Success: Blue/Green or Rolling update triggered to Amazon EKS"
