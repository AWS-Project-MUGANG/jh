<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무강대학교 학사행정 로그인</title>
    <!-- 공통 스타일 사용 -->
    <link rel="stylesheet" href="../../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--sidebar-bg);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .login-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #121858;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>무강대학교</h1>
        <p>통합 학사행정 서비스 로그인</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="studentId">학번/사번</label>
                <input type="text" id="studentId" placeholder="학번을 입력하세요" required>
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
    </div>

    <script>
        // 백엔드 연결 전 임시 로그인 로직
        function handleLogin(e) {
            e.preventDefault();
            const sid = document.getElementById('studentId').value;
            const pwd = document.getElementById('password').value;

            if (sid && pwd) {
                // 아이디에 'admin' 또는 'prof'가 포함되어 있으면 강사 화면으로 이동
                if (sid.toLowerCase().includes('admin') || sid.toLowerCase().includes('prof')) {
                    alert('강사(관리자) 권한으로 로그인 되었습니다.');
                    window.location.href = '../admin/dashboard.html';
                } else {
                    alert('학생 권한으로 로그인 되었습니다.');
                    window.location.href = '../student/dashboard.html';
                }
            }
        }
    </script>
</body>

</html>
