<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 서류 결재함</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .approval-card {
            background: white;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-title {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .doc-meta {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .btn-group button {
            margin-left: 5px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }

        .btn-approve {
            background-color: #2e7d32;
        }

        .btn-reject {
            background-color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header" style="background-color: #37474f;">
                <div class="student-info"><span class="name">김무강 교수</span></div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item" onclick="location.href='dashboard.html'">뒤로 가기 (대시보드)</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="logo-area">
                    <h2>결재 / 서류 반려함</h2>
                </div>
            </header>
            <div class="content-area">
                <div class="approval-card">
                    <div>
                        <div class="doc-title">휴학원 신청 (일반휴학)</div>
                        <div class="doc-meta">신청자: 임정현 (22517717) | 사유: 경제적 사정 | 신청일: 2024.11.20</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-approve">서류 승인</button>
                        <button class="btn-reject">반려 처리</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
