<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자동 서류 생성</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="student-info"><span class="name">임정현</span></div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item" onclick="location.href='dashboard.html'">뒤로 가기 (대시보드)</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="logo-area">
                    <h2>AI 자동 서류 생성 및 신청</h2>
                </div>
            </header>
            <div class="content-area">
                <div class="form-container">
                    <p style="margin-bottom: 20px; color: #666;">제출하려는 양식과 사유를 적어주시면 AI가 학사 규정에 맞게 공식 서류(PDF) 초안을 작성해
                        드립니다.</p>
                    <div class="form-group">
                        <label>신청 서류 종류</label>
                        <select>
                            <option>일반휴학원</option>
                            <option>군입대휴학원</option>
                            <option>전과 신청서</option>
                            <option>장학금 수혜 연장 신청서</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>상세 사유 (자유롭게 작성)</label>
                        <textarea placeholder="예: 경제적 사정으로 인해 1년간 휴학하고자 합니다..."></textarea>
                    </div>
                    <button class="btn-submit" onclick="alert('AI 문서 생성이 요청되었습니다.')">AI 서류 초안 생성하기</button>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
