# 개발 및 테스트를 위한 Docker Compose 설정
# 실제 AWS(EKS) 배포시에는 Kubernetes 매니페스트(yaml)로 변환되어 사용됩니다.
version: '3.8'

services:
  # 백엔드 (FastAPI) 컨테이너
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test.db # 향후 RDS 호스트 입력
    volumes:
      - ./backend:/app # 로컬 코드 변경 실시간 반영

  # 프론트엔드 (바닐라 JS + Nginx) 컨테이너
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    # 프론트 컨테이너 시작 전 백엔드 서버가 먼저 켜지게 의존성 설정
    depends_on:
      - backend
