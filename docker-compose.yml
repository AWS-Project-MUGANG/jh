# 개발 및 테스트를 위한 Docker Compose 설정
# 실제 AWS(EKS) 배포시에는 Kubernetes 매니페스트(yaml)로 변환되어 사용됩니다.
version: '3.8'

services:
  # 백엔드 (FastAPI) 컨테이너
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # 호스트의 SSH 터널링된 포트(5432)를 통해 실제 AWS RDS에 접속
      - DATABASE_URL=postgresql://mugangadmin:!!anrkddl615@host.docker.internal:5432/mugang

  # 프론트엔드 (바닐라 JS + Nginx) 컨테이너
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8888:80"
    # 프론트 컨테이너 시작 전 백엔드 서버가 먼저 켜지게 의존성 설정
    depends_on:
      - backend
